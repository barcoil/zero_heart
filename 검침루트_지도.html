var groupOverlays = [];

function toggleControls() {
  var ctrl = document.getElementById('controls');
  var btn  = document.getElementById('toggle-btn');
  ctrl.classList.toggle('minimized');
  btn.textContent = ctrl.classList.contains('minimized') ? '➕' : '➖';
}

function showInfo(gi, pi) {
  var g = GROUPS[gi], p = g.points[pi];
  var html = '<b>[' + p.uid + '] ' + g.label + ' (' + (pi+1) + '번째)</b><br>' +
    '주소: ' + p.address + '<br>' +
    (p.building ? '건물: ' + p.building + '<br>' : '') +
    '세대: ' + p.units + '세대' +
    (p.note1 ? '<br>비고: ' + p.note1 + ' ' + p.note2 : '');
  document.getElementById('infobox-content').innerHTML = html;
  document.getElementById('infobox').style.display = 'block';
}

GROUPS.forEach(function(g, gi) {
  var ovList = [];
  var visible = (gi === 0);

  // 폴리라인 (도로 경로 우선, 없으면 직선)
  var pathCoords = (g.road_geometry && g.road_geometry.length > 0)
    ? g.road_geometry.map(function(c) { return new kakao.maps.LatLng(c[0], c[1]); })
    : g.points.map(function(p) { return new kakao.maps.LatLng(p.lat, p.lng); });
  var poly = new kakao.maps.Polyline({
    path: pathCoords, strokeWeight: 4,
    strokeColor: g.color, strokeOpacity: 0.85, strokeStyle: 'solid'
  });
  if (visible) poly.setMap(map);
  ovList.push(poly);

  // 마커
  g.points.forEach(function(p, pi) {
    var isStart = (pi === 0);
    var bg = isStart ? '#cc0000' : g.color;
    var sz = isStart ? 12 : 8;
    var border = isStart ? '2px solid #fff' : '1.5px solid #fff';
    var content = '<div onclick="showInfo(' + gi + ',' + pi + ')" style="display:flex;align-items:center;cursor:pointer;">' +
      '<div style="background:' + bg + ';border-radius:50%;flex-shrink:0;' +
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'border:' + border + ';box-shadow:1px 1px 4px rgba(0,0,0,0.6);"></div>' +
      '<span style="margin-left:3px;font-size:13px;font-weight:bold;color:#111;' +
      'background:rgba(255,255,255,0.75);padding:0 2px;border-radius:2px;' +
      'white-space:nowrap;line-height:1.4;color:#0000cc;">' + p.uid + '</span>' +
      '</div>';
    var ov = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(p.lat, p.lng),
      content: content, xAnchor: 0.5, yAnchor: 0.5,
      zIndex: isStart ? 10 : 5
    });
    if (visible) ov.setMap(map);
    ovList.push(ov);
  });

  groupOverlays.push(ovList);

  // 레이어 컨트롤 항목
  var row = document.createElement('div');
  row.className = 'layer-row';
  var cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = 'cb_' + gi;
  cb.checked = visible; cb.dataset.gi = gi;
  var dot = document.createElement('span');
  dot.className = 'dot'; dot.style.background = g.color;
  var lbl = document.createElement('label');
  lbl.htmlFor = 'cb_' + gi;
  lbl.textContent = g.label + '  ' + g.dist_km + 'km';
  row.appendChild(cb); row.appendChild(dot); row.appendChild(lbl);
  document.getElementById('layer-list').appendChild(row);

  cb.addEventListener('change', function() {
    var i = parseInt(this.dataset.gi);
    var on = this.checked;
    groupOverlays[i].forEach(function(ov) { ov.setMap(on ? map : null); });
  });
});
